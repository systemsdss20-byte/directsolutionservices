<!-- Alerts -->
<div class="alert alert-danger" role="alert" hidden="True">
	Mensaje
</div>
<div class="alert alert-warning" role="alert" hidden="True">
	Mensaje
</div>
<div class="alert alert-info" role="alert" hidden="True">
	Mensaje
</div>
<div class="alert alert-success" role="alert" hidden="True">
	Mensaje
</div>

<!-- Confirm Modal -->
<div class="modal fade" id="ConfirmModal" tabindex="-1" role="dialog" aria-labelledby="ConfirmModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" id="ConfirmModalLabel">mensaje 2</h4>
            </div>
            <div id="ConfirmModalBody" class="modal-body">
                <form>
                    <div class="form-group">
                        <label for="recipient-name" class="control-label">Recipient:</label>
                        <input type="text" class="form-control" id="recipient-name">
                    </div>
                    <div class="form-group">
                        <label for="message-text" class="control-label">Message:</label>
                        <textarea class="form-control" id="message-text"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button id="btnCerrar" type="button" class="btn btn-default" data-dismiss="modal">Cancelar</button>
                <button id="btnAceptar" type="button" class="btn btn-primary">Aceptar</button>
            </div>
        </div>
    </div>
</div>
<!--Delete Modal -->
<div class="modal fade" id="modal-delete" tabindex="-1" role="dialog" aria-labelledby="exampleModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                <h4 class="modal-title" >Confirmar Eliminación</h4>
            </div>
            <div class="modal-body">
                ¿Confirma usted que desea eliminar este elemento?
				<p class="text-warning"><small>Recuerde que una vez confirmado el elemento eliminado no podrá ser recuperado</small></p>
            </div>
            <div class="modal-footer">
                <form method="POST" id="frmEliminar">
	            	{% csrf_token %}
	                <input type="hidden" name="id">
		            <button type="button" class="btn btn-default" data-dismiss="modal">No</button>
		            <button type="submit" class="btn btn-primary" id="aceptar">Si</button>
	            </form>
            </div>
        </div>
    </div>
</div>
