<!-- /.modal -->
{% load static %}
<div id="event-details"  class="modal hide fade in"   role="dialog">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header justify-content-end">
                {% if event.user.id == user.id %}
                <a id="event-edit" href="#" class="mr-3"><span class="fa fa-edit"></span></a>
                <a id="event-delete" href="#" class="ml-2" data-toggle="modal" data-target="#confirmation-delete-modal"><span class="fa fa-trash"></span></a>
                {% endif %}
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">X</span>
                </button>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-1"><span class="status-icon bg-success"></span></div>
                    <div class="col">
                        <div class="card-title">{{ event.title }}</div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-1">
                        <span class="fa fa-calendar"></span>
                    </div>
                    <div class="col">
                        <span class="strong">From:</span>
                        {{ event.start_time | date:"D, M d - H:i"}}
                    </div>
                </div>
                <div class="row">
                    <div class="col-1">
                        <span class="fa fa-calendar"></span>
                    </div>
                    <div class="col">
                        <span class="strong">To:</span>
                        {{ event.end_time | date:"D, M d - H:i"}}
                    </div>
                </div>
                <div class="row">
                    <div class="col-1">
                        <span class="fa fa-navicon"></span>
                    </div>
                    <div class="col" {% if event.description %}style="border-radius: 10px;background: rgba(100,100,100,0.45);color: white;"{% endif %}>
                        {{ event.description|linebreaks }}
                    </div>
                </div>
                <div class="row">
                    <div class="col-1">
                        <span class="avatar" style="background-image: url('/media/{{ event.user.avatar }}')"></span>
                    </div>
                    <div class="col">
                        <span class="strong m-3 text-muted">{{ event.user.fullname }}</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer justify-content-end">
                <button type="button" class="btn btn-danger btn-pill" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="confirmation-delete-modal"  role="dialog">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-status bg-danger"></div>
            <div class="modal-body text-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="icon mb-2 text-danger icon-lg" width="24" height="24" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" fill="none" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M12 9v2m0 4v.01"></path><path d="M5 19h14a2 2 0 0 0 1.84 -2.75l-7.1 -12.25a2 2 0 0 0 -3.5 0l-7.1 12.25a2 2 0 0 0 1.75 2.75"></path></svg>
                <div class="modal-title">Are you sure you want to remove?</div>
                <input id="event-id" type="number" hidden name="event_id" value="{{ event.id }}">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary mr-auto" data-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-danger" data-dismiss="modal" id="btn-remove-event">Yes, remove</button>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    //Eliminar evento
    $('#event-delete').on('click', function(e){
        e.preventDefault();
        $('#event-detail').modal('hide');
        $('#confirmation-delete-modal').modal('show');
    });
    $('#btn-remove-event').on("click", function (e) {
        e.preventDefault();
        const data = { event_id:$("#event-id").val() };
        sendForm('/calendar/', JSON.stringify(data), '{{ csrf_token }}', 'DELETE').then(
            response => {
                const { message } = response;
                notification(message.description, message.type);
                let event = calendar.getEventById(data.event_id);
                event.remove();
                total_notifications();
                $('body').removeClass('modal-open');
		        $('.modal-backdrop').remove();
                $('#event-details').modal('hide');
                $('#running-events').load('/calendar/running-events/');
            }
        )
    });

    //Editar evento
    $("#event-edit").on("click", function (e) {
        e.preventDefault();
        const id = $('#event-id').val();
        $("#event-detail").modal("hide");
        $('#load-modal').load(`/calendar/event-edit/${id}`, () => {
            $('#eventModal').modal('show');
        });
    });
</script>
