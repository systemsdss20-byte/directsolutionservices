{% load static %}
<div class="modal modal-blur fade" id="modal-sent-emails" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-md modal-dialog-centered" role="dialog">
        <div class="modal-content">
            <div class="modal-header text-white bg-info">
                 <h5 class="modal-title">Invoice sent by email</h5>
                  <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <!-- SVG icon code -->X
                  </button>
            </div>
            <div class="modal-body">
                <table class="table table-striped table-responsive table-responsive-md table-center">
                    <thead class="thead-dark">
                        <tr>
                            <th>&nbsp;</th>
                            <th>USERNAME</th>
                            <th>TO EMAIL</th>
                            <th>SENT</th>
                            <th>DATE</th>
                        </tr>
                    </thead>
                    <tbody>
                    {% for email in emails %}
                        <tr>
                            <td>
                                <span class="avatar avatar-sm" style="background-image: url('/media/{{ email.user.avatar }}')"></span>
                            </td>
                            <td>{{ email.user }}</td>
                            <td>{{ email.email }}</td>
                            <td><span class="badge badge-pill {% if email.sent %}bg-green{% else %}bg-red{% endif %}">{% if email.sent %}Yes{% else %}No{% endif %}</span></td>
                            <td>{{ email.sending_date | date:"m/d/Y H:m:s"}}</td>
                        </tr>
                    {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
