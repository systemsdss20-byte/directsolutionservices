{% extends 'base.html' %}
{% load static %}
{% block title-page %}Units{% endblock %}
{% block index %} {% endblock %}
{% block report %}active{% endblock %}
{% block units_report %}active{% endblock %}
{% block container-fluid %}
<div class="row">
    <div class="col-md-12">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title">
                    Units
                </h3>
            </div>
            <div class="card-body">
                <table class="table card-table table-vcenter table-bordered table-striped" id="tbUnits">
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block script %}
    <script type="text/javascript" src="{% static 'ajax_datatable/js/utils.js' %}"></script>
    <script type="text/javascript" src="{% static '/site/plugins/datatables-rowgroup/js/dataTables.rowGroup.min.js' %}"></script>
    <script type="text/javascript" src="{% static '/site/plugins/datatables-rowgroup/js/rowGroup.bootstrap4.min.js' %}"></script>
    <script type="application/javascript">
        AjaxDatatableViewUtils.initialize_table(
            $('#tbUnits'),
            '/Procedure/units_datatable/',
            {
                order: [[10, 'asc']],
                processing: false,
                autoWidth: false,
                full_row_select:false,
            }
        );
        AjaxDatatableViewUtils.adjust_table_columns();
    </script>
{% endblock %}
