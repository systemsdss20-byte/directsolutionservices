<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-xl" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">IFTA NEW APPLICATION</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frmIftaApp" role="form" method="post">
                    {% csrf_token %}
                    <table class="table">
                        <tbody>
                            <tr>
                                <td>
                                    <h3 class="card-title">Customer:</h3>
                                </td>
                                <td colspan="7">
                                    <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                                </td>
                                <td>
                                    <label class="form-label">Amount:</label>
                                </td>
                                <td>
                                    <input id="amount" class="form-control form-control-sm text-danger" type="text" readonly value="0.00">
                                </td>
                            </tr>
                            <tr>
                                <td colspan="2">
                                    <label class="form-label col col-form-label" for="apptype">Application Type:</label>
                                </td>
                                <td colspan="2">
                                    <select id="apptype" name="apptype" class="form-select">
                                        <option value="1">New Account</option>
                                        <option value="2">Renewal</option>
                                        <option value="3">Add Vehicle</option>
                                    </select>
                                </td>
                                <td>
                                    <label class="form-label col col-form-label" for="account">Account:</label>
                                </td>
                                <td>
                                    <select id="account" name="account" class="form-select">
                                        <option value="0">Select</option>
                                        <option value="1">Company</option>
                                        <option value="2">Personal</option>
                                    </select>
                                </td>
                                <td>
                                    <label class="form-label" for="qtyplate">Qty Plate's:</label>
                                </td>
                                <td>
                                    <select id="qtyplate" name="qtyplate" class="form-control-sm form-select">
                                        <option value="0">Select</option>
                                        <option value="1">1</option>
                                        <option value="2">2</option>
                                        <option value="3">3</option>
                                        <option value="4">4</option>
                                    </select>
                                </td>
                                <td colspan="2">&nbsp;</td>
                            </tr>
                            <tr>
                                <td width="80px">
                                    <label class="form-label" for="plate1">Plate 1:</label>
                                </td>
                                <td>
                                    <input id="plate1" class="form-control form-control-sm" name="plate" type="text" readonly>
                                </td>
                                <td width="80px">
                                    <label class="form-label" for="plate2">Plate 2:</label>
                                </td>
                                <td>
                                    <input id="plate2" class="form-control form-control-sm" name="plate" type="text" readonly>
                                </td>
                                <td>
                                    <label class="form-label" for="plate3">Plate 3:</label>
                                </td>
                                <td>
                                    <input id="plate3" class="form-control form-control-sm" name="plate" type="text" readonly>
                                </td>
                                <td width="80">
                                    <label class="form-label" for="plate4">Plate 4:</label>
                                </td>
                                <td>
                                    <input id="plate4" class="form-control form-control-sm" name="plate" type="text" readonly>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <button id="showPDF" type="button" class="btn btn-pill btn-primary">View</button>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    post_showPDF('/Procedure/iftaapp/{{ customer.idcustomer }}', '#frmIftaApp');
    $('#qtyplate').on('change',function () {
        var opt = $(this).val();
        switch (opt) {
            case '0':
                $("#amount").val('0.00');
                $('#plate1').prop('readonly', true);
                $('#plate2').prop('readonly', true);
                $('#plate3').prop('readonly', true);
                $('#plate4').prop('readonly', true);
                break;
            case '1':
                $("#amount").val('4.00');
                $('#plate1').prop('readonly', false);
                $('#plate2').prop('readonly', true);
                $('#plate3').prop('readonly', true);
                $('#plate4').prop('readonly', true);
                break;
            case '2':
                $("#amount").val('8.00');
                $('#plate1').prop('readonly', false);
                $('#plate2').prop('readonly', false);
                $('#plate3').prop('readonly', true);
                $('#plate4').prop('readonly', true);
                break;
            case '3':
                $("#amount").val('12.00');
                $('#plate1').prop('readonly', false);
                $('#plate2').prop('readonly', false);
                $('#plate3').prop('readonly', false);
                $('#plate4').prop('readonly', true);
                break;
            case '4':
                $("#amount").val('16.00');
                $('#plate1').prop('readonly', false);
                $('#plate2').prop('readonly', false);
                $('#plate3').prop('readonly', false);
                $('#plate4').prop('readonly', false);
                break;
            default:
                $("#amount").val('0.00');
                $('#plate1').prop('readonly', true);
                $('#plate2').prop('readonly', true);
                $('#plate3').prop('readonly', true);
                $('#plate4').prop('readonly', true);
        }
    });
</script>
