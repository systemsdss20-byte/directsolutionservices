<style>
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">ADDRESS CHANGE FORM</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frmIftaApp" role="form" method="post">
                    {% csrf_token %}
                    <table class="table">
                        <tbody>
                            <tr>
                                <td>
                                    <h3 class="card-title">Customer:</h3>
                                </td>
                                <td colspan="7">
                                    <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col col-form-label" for="account">Account:</label>
                                </td>
                                <td>
                                    <select id="account" name="account" class="form-select">
                                        <option value="0">Select</option>
                                        <option value="1">Company</option>
                                        <option value="2">Personal</option>
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col col-form-label" for="date">Date:</label>
                                </td>
                                <td>
                                    <div class="input-group">
                                        <input id="date" class="form-control form-control-sm" name="date" type="text">
                                        <span class="input-group-text">
                                            <i class="fa fa-calendar-o"></i>
                                        </span>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <button id="showPDF" type="button" class="btn btn-pill btn-primary">View</button>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#date').datepicker({
        dateFormat: 'mm/dd/yy',
        changeMonth: true,
        changeYear: true
    });
    post_showPDF('/Procedure/ifta_address_change_form/{{ customer.idcustomer }}', '#frmIftaApp');
</script>
