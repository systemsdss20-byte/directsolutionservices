<style>
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{{ title_certificate_random }}</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frmData" role="form" method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-sm-2">
                            <h3 class="card-title">Customer:</h3>
                        </div>
                        <div class="col">
                            <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                        </div>
                    </div>
                    <div class="hr-text-spaceless"> </div>
                    <div class="row">
                        <div class="col-md-4">
                            <label class="form-label custom-control-inline" for="apptype">Effective Date:</label>
                        </div>
                        <div class="col-md-4">
                            <div class="input-group">
                                <input name="effective_date" id="effective-date" class="form-control form-control-sm" type="text">
                                <span class="input-group-text"><i class="fa fa-calendar-o"></i></span>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                {% if urlcertificate %}
                <button id="showPDF" type="button" class="btn btn-pill btn-primary">View</button>
                {% else %}
                <button id="sendEmail" type="button" class="btn btn-pill btn-primary">Send Email</button>
                {% endif %}
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#effective-date').datepicker({
        dateFormat: 'mm/dd/yy',
        changeMonth: true,
        changeYear: true
    });
    {% if urlcertificate %}
        post_showPDF('/Procedure/{{urlcertificate}}/{{ customer.idcustomer }}', '#frmData');
    {% else %}
        $('#sendEmail').on('click',function(e){
            e.preventDefault();
            HoldOn.open({
                theme: "sk-cube-grid",
                message: "Sending email..."
            });
            sendForm(
				'/Procedure/certificate_random_test_email/{{ customer.idcustomer }}', 
				JSON.stringify(
					{
						'certificate_date': $('input[name=effective_date]').val()
					}
			), '{{ csrf_token }}').then(
				result => {
					HoldOn.close();
					( {message, data} = result );
                    $('#modal-show').modal('hide');
                    $('#id_bitexp').val(data.bitexp);
					notification(message.description, message.type);
				}
			).catch(error => {
				HoldOn.close();
			});
        });
    {% endif %}
</script>
