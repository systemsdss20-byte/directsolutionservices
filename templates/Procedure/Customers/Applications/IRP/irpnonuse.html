<style>
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg" role="form">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">NON-USE AFFIDAVIT</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <table class="table">
                        <tbody>
                            <tr>
                                <td>
                                    <h3 class="card-title">Customer:</h3>
                                </td>
                                <td colspan="7">
                                    <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col-form-label" for="unit">Units:</label>
                                </td>
                                <td>
                                    <select name="unit" class="form-select form-select-sm">
                                        {% for unit in units %}
                                            <option value="{{ unit.idunit }}"> {{ unit.vin }}</option>
                                        {% endfor %}
                                    </select>
                                </td>
                                <td>
                                    <label class="form-label col-form-label" for="from">From:</label>
                                </td>
                                <td>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <li class="fa fa-calendar-o"></li>
                                        </span>
                                        <input id="from" name="from" class="form-control form-control-sm datepicker" type="text" required>
                                    </div>
                                </td>
                                <td>
                                    <label class="form-label col-form-label" for="thru">Thru:</label>
                                </td>
                                <td>
                                    <div class="input-group">
                                        <span class="input-group-text">
                                            <li class="fa fa-calendar-o"></li>
                                        </span>
                                        <input id="thru" name="thru" class="form-control form-control-sm datepicker" type="text" required>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <button id="showPDF" type="button" class="btn btn-pill btn-primary">View</button>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('.datepicker').datepicker({
        dateFormat: 'mm/dd/yy',
        changeMonth: true,
        changeYear: true
    });
    post_showPDF('/Procedure/irpnonuse/{{ customer.idcustomer }}', '#frm');
</script>
