<style>
    .no-display{
        display: none;
    }
    .selectize-control, .validate_annual_report, .selectize, .single{
        background-color: #FFFFFF;
    }
    .selectize-input{
        width: 100%;
        background-color: #FFFFFF;
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true" data-backdrop="static">
    <div class="modal-dialog modal-dialog-centered " role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">DUPLICATE TITLE</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <div class="form-group row">
                        <div class="col-sm-2 col-form-label">
                            <h3 class="card-title">Customer:</h3>
                        </div>
                        <div class="col-sm-10 col-form-label">
                            <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="col-sm-4 col-form-label form-label" for="agent">Type Of Application:</label>
                        <div class="input-group col-sm">
                            <select id="type_application" name="type_application" class="form-select item form-control-sm" required="true">
                                <option>--Select--</option>
                                <option value="VESSEL DUPLICATE">VEHICLE/VESSEL DUPLICATE</option>
                                <option value="VEHICLE LOST">VEHICLE/VESSEL LOST IN TRANSIT</option>
                            </select>
                        </div>
                        <div id="group_vessel_duplicate" class="no-display col-sm">
                            <label class="form-check form-check-inline">
                                <input class="form-check-input vessel" type="checkbox" name="vessel_duplicate" value="LOST">
                                <span class="form-check-label">LOST</span>
                            </label>
                            <label class="form-check form-check-inline">
                                <input class="form-check-input vessel" type="checkbox" name="vessel_duplicate" value="STOLEN">
                                <span class="form-check-label">STOLEN</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label" for="agent">Owner:</label>
                        <div class="input-group col-sm">
                            <select id="owner" name="owner" class="form-select item form-control-sm" required="true">
                                <option>--Select--</option>
                                <option value="1">Company Name</option>
                                <option value="2">Owner Name</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-form-label col-sm-4" for="unit">Unit:</label>
                        <div class="col-sm">
                            <select id="unit" name="unit" class="selectized form-select">
                                <option value="" selected>Select a unit</option>
                                {% for unit in units %}
                                    <option value="{{ unit.idunit }}">{{ unit.vin }} | {{ unit.status }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <input type="submit" id="showPDF" class="btn btn-pill btn-primary" value="View" />
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#unit').selectize({
        create: false,
        sortField: "text",
    });
    $('.vessel').on('click', function() {
        $('.vessel').not(this).prop('checked', false);
    });
    $('#type_application').on('change', function (){
        $('.vessel').prop('checked', false);
        if($(this).val() == 'VESSEL DUPLICATE'){
            $('#group_vessel_duplicate').removeClass('no-display');
        }else{
            $('#group_vessel_duplicate').addClass('no-display');
        }
    });
    post_showPDF('/Procedure/duplicate_title/{{ customer.idcustomer }}', '#frm');
</script>
