<style>
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
    .selectize-input{
        width: 100%;
        background-color: #FFFFFF;
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true" data-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">SURRENDER LICENSE PLATE</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <div class="form-group row">
                        <div class="col-sm-3 col-form-label">
                            <h3 class="card-title">Customer:</h3>
                        </div>
                        <div class="col-sm col-form-label">
                            <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label " for="date">Date:</label>
                        <div class="input-group col-sm">
                            <input name="date" type="text" class="form-control form-control-sm datepicker" value="{{ today }}">
                            <span class="input-group-text">
                                <i class="fa fa-calendar-o"></i>
                            </span>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label" for="agent">Owner:</label>
                        <div class="input-group col-sm">
                            <select id="owner" name="owner" class="form-select item form-control-sm" required="true">
                                <option>--Select--</option>
                                <option value="1">Company Name</option>
                                <option value="2">Owner Name</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-form-label col-sm-4" for="unit">Plate Number:</label>
                        <div class="col-sm">
                            <select id="plate" name="plate" class="selectized form-select">
                                <option value="" selected>Select</option>
                                {% for unit in units %}
                                    <option value="{{ unit.irp }}">{{ unit.irp }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <input type="submit" id="showPDF" class="btn btn-pill btn-primary" value="View" />
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#plate').selectize({
        create: false,
        sortField: "text",
    });
    $('.datepicker').datepicker({
        dateFormat: 'mm/dd/yy',
        changeMonth: true,
        changeYear: true
    });
    post_showPDF('/Procedure/surrender_license_plate/{{ customer.idcustomer }}', '#frm');
</script>
