<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered " role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">POWER OF ATTORNEY LOCAL</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <table class="table">
                        <tbody>
                            <tr>
                                <td>
                                    <h3 class="card-title">Customer:</h3>
                                </td>
                                <td colspan="7">
                                    <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col-form-label" for="agent">Agent:</label>
                                </td>
                                <td>
                                    <div class="input-group">
                                        <select id="agents" name="agents" class="form-select item form-control-sm" required="true">
                                            <option>--Select--</option>
                                        {% for agent in agents %}
                                            <option value="{{ agent.first_name }} {{ agent.last_name }}">{{ agent.first_name }} {{ agent.last_name }}</option>
                                        {% endfor %}
                                        </select>
                                    </div>
                                </td>
                                <td>
                                    <label class="form-label col-form-label" for="unit">Unit:</label>
                                </td>
                                <td>
                                    <select id="unit" name="unit" class="form-select item form-control-sm" required="true">
                                        {% for unit in units %}
                                            <option value="{{ unit.idunit }}">{{ unit.vin }}</option>
                                        {% endfor %}
                                    </select>
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col-form-label" for="agent">Owner:</label>
                                </td>
                                <td>
                                    <div class="input-group">
                                        <select id="owner" name="owner" class="form-select item form-control-sm" required="true">
                                            <option>--Select--</option>
                                            <option value="1">Company Name</option>
                                            <option value="2">Owner Name</option>
                                        </select>
                                    </div>
                                </td>
                                <td width="100px;">
                                    <label class="form-label col-form-label" for="unit">Co-Owner:</label>
                                </td>
                                <td>
                                    <select id="co_owner" name="co_owner" class="form-select item form-control-sm" required="true">
                                        <option>--Select--</option>
                                        <option value="1">Company Name</option>
                                        <option value="2">Owner Name</option>
                                    </select>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <input type="submit" id="showPDF" class="btn btn-pill btn-primary" value="View" />
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#agents').chosen({
        width: '100%',
    });
    post_showPDF('/Procedure/poalocal/{{ customer.idcustomer }}', '#frm');
</script>
