<style>
    .no-display{
        display: none;
    }
    .selectize-control, .validate_annual_report, .selectize, .single{
        background-color: #FFFFFF;
    }
    .selectize-input{
        width: 100%;
        background-color: #FFFFFF;
    }
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true" data-backdrop="static">
    <div class="modal-dialog modal-dialog-centered " role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">APPLICATION FOR TRANSPORTER LICENSE PLATE</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <div class="form-group row">
                        <div class="col-sm-2 col-form-label">
                            <h3 class="card-title">Customer:</h3>
                        </div>
                        <div class="col-sm-10 col-form-label">
                            <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label" for="agent">Owner:</label>
                        <div class="input-group col-sm">
                            <select id="owner" name="owner" class="form-select item form-control-sm" required="true">
                                <option>--Select--</option>
                                <option value="1">Company Name</option>
                                <option value="2">Owner Name</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label" for="date">Date:</label>
                        <div class="input-group col-sm">
                            <input name="date" id="date" class="form-control form-control-sm" type="text">
                            <span class="input-group-text"><i class="fa fa-calendar-o"></i></span>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-form-label col-sm-4" for="unit">Unit:</label>
                        <div class="col-sm pt-2">
                            <select id="unit" name="unit" class="selectized form-select">
                                <option value="" selected>Select a unit</option>
                                {% for unit in units %}
                                    <option value="{{ unit.idunit }}">{{ unit.vin }} | {{ unit.status }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="form-group row">
                        <label class="form-label col-sm-4 col-form-label" for="number_plates">Number of Plates:</label>
                        <div class="col-sm col-sm-2 pt-2">
                            <input name="number_plates" id="number_plates" class="form-control form-control-sm" type="number" min="1" value="1">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <input type="submit" id="showPDF" class="btn btn-pill btn-primary" value="View" />
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $('#date').datepicker({
        dateFormat: 'mm/dd/yy',
        changeMonth: true,
        changeYear: true
    });

    $('#unit').selectize({
        create: false,
        sortField: "text",
    });

    post_showPDF('/Procedure/application_transporter_license_plate/{{ customer.idcustomer }}', '#frm');
</script>
