<style>
    .ui-datepicker {
      z-index: 1600 !important; /* has to be larger than 1050 */
    }
</style>
<div class="modal modal-blur fade" id="modal-show" role="dialog" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">New Mexico Permit</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="close">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="frm" role="form" method="post">
                    {% csrf_token %}
                    <table class="table table-responsive-md">
                        <tbody>
                            <tr>
                                <td>
                                    <h3 class="card-title">Customer:</h3>
                                </td>
                                <td colspan="7">
                                    <span class="text-danger"> {{ customer.idcustomer }} </span>- {{ customer.cusname }}
                                </td>
                            </tr>
                            <tr>
                                <td>
                                    <label class="form-label col-form-label-sm" for="start_period">Starting Period:</label>
                                    <input type="text" id="start_period" class="datepicker form-control" name="start_period" placeholder="mm/dd/yyyy" value="{{ start_period }}" />
                                </td>
                                <td>
                                    <label class="form-label col-form-label-sm" for="end_period">Ending Period:</label>
                                    <input type="text" id="end_period" class="datepicker form-control" name="end_period" placeholder="mm/dd/yyyy" value="{{ end_period }}"/>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-pill btn-danger" data-dismiss="modal">Cancel</button>
                <button id="showPDF" type="button" class="btn btn-pill btn-primary">View</button>
            </div>
        </div>
    </div>
</div>
<script type="text/javascript">
    $(document).ready(function (){
        $('.datepicker').datepicker({
            dateFormat: 'mm/dd/yy',
                changeMonth: true,
                changeYear: true,
                showButtonPanel: true,
        });
    }) ;
    post_showPDF('/Procedure/permits_nm/{{ customer.idcustomer }}', '#frm');
</script>
